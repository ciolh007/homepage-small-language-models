<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#0A1A3F"/>

  <!-- Magical swirl -->
  <path d="M100 500 Q200 300 400 400 T700 200" 
        stroke="#4FC3F7" stroke-width="6" fill="none" 
        stroke-dasharray="10,5"/>
  <circle cx="700" cy="200" r="20" fill="#4FC3F7"/>

  <!-- Stars -->
  <circle cx="150" cy="150" r="3" fill="#fff"/>
  <circle cx="250" cy="100" r="4" fill="#fff"/>
  <circle cx="600" cy="80" r="3" fill="#fff"/>
  <circle cx="500" cy="200" r="2" fill="#fff"/>

  <!-- Robot gear -->
  <circle cx="400" cy="300" r="80" fill="none" stroke="#FFD700" stroke-width="8"/>
  <circle cx="400" cy="300" r="20" fill="#FFD700"/>
  <line x1="400" y1="220" x2="400" y2="180" stroke="#FFD700" stroke-width="6"/>
  <line x1="480" y1="300" x2="520" y2="300" stroke="#FFD700" stroke-width="6"/>
  <line x1="400" y1="380" x2="400" y2="420" stroke="#FFD700" stroke-width="6"/>
  <line x1="320" y1="300" x2="280" y2="300" stroke="#FFD700" stroke-width="6"/>

  <!-- Wand with spark -->
  <rect x="650" y="450" width="8" height="80" fill="#fff"/>
  <polygon points="654,450 670,430 638,430" fill="#FFD700"/>
  <circle cx="654" cy="430" r="10" fill="#4FC3F7"/>

  <!-- Circuit lines -->
  <line x1="100" y1="100" x2="200" y2="200" stroke="#00E5FF" stroke-width="3"/>
  <line x1="200" y1="200" x2="300" y2="150" stroke="#00E5FF" stroke-width="3"/>
  <circle cx="300" cy="150" r="6" fill="#00E5FF"/>
</svg>
